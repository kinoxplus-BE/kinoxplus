services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kinoxplus
      POSTGRES_PASSWORD: kinoxplus
      POSTGRES_DB: kinoxplus
    ports:
      # 5435 on the host — 5432-5434 are commonly taken by local Postgres installs.
      - '5435:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kinoxplus -d kinoxplus']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
